<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Experience Details | CBT</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/home.css" />

  <style>
    .navbar {
      position: relative;
      background: #0f172a;
      padding: 18px 0;
    }

    .package-page {
      background: #f8fafc;
      padding: 32px 0 64px;
    }

    .container-custom {
      max-width: 1200px;
      margin: auto;
      padding: 0 20px;
    }

    /* HERO */
    .hero-image {
      width: 100%;
      height: 480px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 24px;
    }

    .title {
      font-size: 2.8rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }

    .meta {
      color: #64748b;
      margin-bottom: 20px;
    }

    /* GRID */
    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 32px;
    }

    /* EXPERIENCE */
    .section {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .section h2 {
      margin-bottom: 14px;
      color: #0f172a;
    }

    .section p {
      line-height: 1.8;
      color: #334155;
    }

    /* BOOKING CARD */
    .booking-card {
      position: sticky;
      top: 100px;
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .price {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .book-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #0f766e;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }

    .book-btn:hover {
      background: #0d5c57;
    }

    .info-line {
      margin: 8px 0;
      color: #475569;
    }

    /* BACK */
    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      color: #0f766e;
      text-decoration: none;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .booking-card {
        position: relative;
        top: auto;
      }
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="container nav-wrapper">
    <div class="logo">CBT</div>

    <nav class="nav-menu">
      <a href="index.html">Home</a>
      <a href="destinations.html">Destinations</a>
      <a href="packages.html">Packages</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<section class="package-page">
  <div class="container-custom">

    <a href="packages.html" class="back-btn">← Back to Packages</a>

    <div id="packageDetailsContainer">
      <!-- JS will inject content -->
    </div>

  </div>
</section>

<script type="module" src="js/pages/packageDetails.js"></script>

</body>
</html>
