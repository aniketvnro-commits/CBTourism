<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendors | CBT Admin</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/vendor.css" />

  <style>
    .admin-page {
      background: #f5f7fb;
      min-height: 100vh;
      padding: 36px 0 64px;
    }

    /* ─── Page header ────────────────────────────────────────────────────────── */
    .admin-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .admin-page-header h1 {
      margin: 0 0 6px;
      font-size: 1.9rem;
      color: #0f172a;
    }

    .admin-page-header p {
      margin: 0;
      color: #64748b;
    }

    /* ─── Search bar ─────────────────────────────────────────────────────────── */
    .admin-search-bar {
      width: 100%;
      max-width: 360px;
      padding: 11px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      background: #ffffff;
      color: #0f172a;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .admin-search-bar:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
    }

    /* ─── Summary bar ────────────────────────────────────────────────────────── */
    .admin-summary {
      margin-bottom: 20px;
      color: #64748b;
      font-size: 0.9rem;
    }

    /* ─── Vendor cards grid ──────────────────────────────────────────────────── */
    .admin-vendors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ─── Vendor card ────────────────────────────────────────────────────────── */
    .admin-vendor-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .admin-vendor-card:hover {
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.1);
    }

    /* Card header with avatar + name */
    .admin-vendor-card-head {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 22px 16px;
      border-bottom: 1px solid #f1f5f9;
    }

    .admin-vendor-avatar {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #0f766e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1rem;
      color: #ffffff;
      flex-shrink: 0;
    }

    .admin-vendor-name h3 {
      margin: 0 0 3px;
      font-size: 1.05rem;
      color: #0f172a;
    }

    .admin-vendor-name p {
      margin: 0;
      font-size: 0.84rem;
      color: #64748b;
    }

    /* Stats row */
    .admin-vendor-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid #f1f5f9;
    }

    .admin-vendor-stat {
      padding: 14px 18px;
      text-align: center;
      border-right: 1px solid #f1f5f9;
    }

    .admin-vendor-stat:last-child {
      border-right: none;
    }

    .admin-vendor-stat-value {
      display: block;
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
    }

    .admin-vendor-stat-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 3px;
    }

    /* Details */
    .admin-vendor-details {
      padding: 16px 22px;
    }

    .admin-vendor-detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.88rem;
      color: #475569;
      line-height: 1.5;
    }

    .admin-vendor-detail-row:last-child {
      margin-bottom: 0;
    }

    .admin-vendor-detail-row strong {
      color: #334155;
      min-width: 70px;
      flex-shrink: 0;
    }

    /* ─── Empty / loading ────────────────────────────────────────────────────── */
    .admin-empty-state {
      grid-column: 1 / -1;
      background: #ffffff;
      border: 1px dashed #cbd5e1;
      border-radius: 20px;
      padding: 48px 24px;
      text-align: center;
      color: #94a3b8;
    }

    .admin-empty-state p {
      margin: 0;
      font-size: 1rem;
    }

    /* ─── Responsive ─────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .admin-page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .admin-search-bar {
        max-width: 100%;
      }
    }
  </style>
</head>
<body class="vendor-body">

  <!-- Navbar -->
  <header class="vendor-navbar">
    <div class="container vendor-nav-wrapper">
      <div class="vendor-brand">
        <div class="vendor-brand-logo">CBT</div>
        <div class="vendor-brand-text">
          <h1>Community Based Tourism</h1>
          <p>Admin Panel</p>
        </div>
      </div>

      <nav class="vendor-nav-links">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-vendors.html" class="active">Vendors</a>
        <a href="admin-packages.html">Packages</a>
        <a href="admin-inquiries.html">Inquiries</a>
      </nav>

      <div class="vendor-nav-actions">
        <a href="index.html" class="btn btn-outline logout-btn">Logout</a>
      </div>
    </div>
  </header>

  <!-- Page -->
  <section class="admin-page">
    <div class="container">

      <div class="admin-page-header">
        <div>
          <h1>Vendors</h1>
          <p>All registered tourism partners on the platform.</p>
        </div>
        <input
          type="text"
          id="vendorSearch"
          class="admin-search-bar"
          placeholder="Search by name or location..."
        />
      </div>

      <p class="admin-summary" id="vendorSummary">Loading vendors...</p>

      <div class="admin-vendors-grid" id="vendorsGrid">
        <div class="admin-empty-state"><p>Loading...</p></div>
      </div>

    </div>
  </section>

  <script type="module" src="js/pages/adminVendors.js"></script>
  <script type="module" src="js/utils/logout.js"></script>
</body>
</html>
