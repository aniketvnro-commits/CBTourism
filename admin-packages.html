<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Packages | CBT Admin</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/vendor.css" />

  <style>
    .admin-page {
      background: #f5f7fb;
      min-height: 100vh;
      padding: 36px 0 64px;
    }

    .admin-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    .admin-page-header h1 {
      margin: 0 0 6px;
      font-size: 1.9rem;
      color: #0f172a;
    }

    .admin-page-header p {
      margin: 0;
      color: #64748b;
    }

    .admin-header-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 520px;
      justify-content: flex-end;
    }

    .admin-search-bar,
    .admin-filter-select {
      padding: 11px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      background: #ffffff;
      color: #0f172a;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .admin-search-bar {
      flex: 1 1 280px;
      min-width: 220px;
    }

    .admin-filter-select {
      flex: 0 0 160px;
    }

    .admin-search-bar:focus,
    .admin-filter-select:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
    }

    .admin-summary {
      margin-bottom: 20px;
      color: #64748b;
      font-size: 0.92rem;
    }

    .admin-packages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .admin-package-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .admin-package-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.09);
    }

    .admin-package-image-wrap {
      position: relative;
      height: 220px;
      background: #e2e8f0;
    }

    .admin-package-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .admin-package-status {
      position: absolute;
      top: 14px;
      right: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: capitalize;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.35);
    }

    .admin-package-status.active {
      background: rgba(220, 252, 231, 0.9);
      color: #166534;
    }

    .admin-package-status.inactive {
      background: rgba(254, 242, 242, 0.92);
      color: #b91c1c;
    }

    .admin-package-body {
      padding: 18px 20px 20px;
    }

    .admin-package-title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .admin-package-title-row h3 {
      margin: 0;
      color: #0f172a;
      font-size: 1.08rem;
      line-height: 1.35;
    }

    .admin-package-price {
      white-space: nowrap;
      color: #0f766e;
      font-weight: 800;
      font-size: 1rem;
    }

    .admin-package-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-bottom: 14px;
      font-size: 0.88rem;
      color: #64748b;
    }

    .admin-package-description {
      margin: 0 0 16px;
      color: #475569;
      font-size: 0.92rem;
      line-height: 1.6;
    }

    .admin-package-info {
      border-top: 1px solid #f1f5f9;
      border-bottom: 1px solid #f1f5f9;
      padding: 14px 0;
      display: grid;
      gap: 8px;
    }

    .admin-package-info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.88rem;
      color: #475569;
    }

    .admin-package-info-row strong {
      color: #334155;
      min-width: 92px;
      flex-shrink: 0;
    }

    .admin-package-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .admin-action-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .admin-action-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .admin-action-btn.view {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .admin-action-btn.toggle {
      background: #ecfeff;
      color: #0f766e;
    }

    .admin-action-btn.delete {
      background: #fef2f2;
      color: #dc2626;
    }

    .admin-action-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .admin-empty-state {
      grid-column: 1 / -1;
      background: #ffffff;
      border: 1px dashed #cbd5e1;
      border-radius: 20px;
      padding: 48px 24px;
      text-align: center;
      color: #94a3b8;
    }

    .admin-empty-state p {
      margin: 0;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .admin-page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .admin-header-actions {
        width: 100%;
        max-width: 100%;
        justify-content: stretch;
      }

      .admin-search-bar,
      .admin-filter-select {
        width: 100%;
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body class="vendor-body">

  <header class="vendor-navbar">
    <div class="container vendor-nav-wrapper">
      <div class="vendor-brand">
        <div class="vendor-brand-logo">CBT</div>
        <div class="vendor-brand-text">
          <h1>Community Based Tourism</h1>
          <p>Admin Panel</p>
        </div>
      </div>

      <nav class="vendor-nav-links">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-vendors.html">Vendors</a>
        <a href="admin-packages.html" class="active">Packages</a>
        <a href="admin-inquiries.html">Inquiries</a>
      </nav>

      <div class="vendor-nav-actions">
        <a href="index.html" class="btn btn-outline logout-btn">Logout</a>
      </div>
    </div>
  </header>

  <section class="admin-page">
    <div class="container">
      <div class="admin-page-header">
        <div>
          <h1>All Packages</h1>
          <p>Review every tourism package listed by vendors and manage their visibility.</p>
        </div>

        <div class="admin-header-actions">
          <input
            type="text"
            id="packageSearch"
            class="admin-search-bar"
            placeholder="Search by title, vendor, location..."
          />

          <select id="statusFilter" class="admin-filter-select">
            <option value="all">All Status</option>
            <option value="active">Active Only</option>
            <option value="inactive">Inactive Only</option>
          </select>
        </div>
      </div>

      <p class="admin-summary" id="packageSummary">Loading packages...</p>

      <div class="admin-packages-grid" id="adminPackagesGrid">
        <div class="admin-empty-state"><p>Loading packages...</p></div>
      </div>
    </div>
  </section>

  <script type="module" src="js/pages/adminPackages.js"></script>
</body>
</html>
