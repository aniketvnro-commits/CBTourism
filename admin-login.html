<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - CBT</title>

  <link rel="stylesheet" href="css/global.css" />

  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .admin-login-card {
      width: 100%;
      max-width: 440px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    .admin-login-badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 6px 14px;
      background: #0f766e;
      color: #ffffff;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 999px;
    }

    .admin-login-card h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      color: #f1f5f9;
      font-weight: 700;
    }

    .admin-login-card > p {
      margin: 0 0 28px;
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.88rem;
      color: #cbd5e1;
    }

    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #334155;
      border-radius: 12px;
      font-size: 0.98rem;
      background: #0f172a;
      color: #f1f5f9;
      outline: none;
    }

    .form-group input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.2);
    }

    .admin-login-btn {
      width: 100%;
      padding: 14px;
      background: #0f766e;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .admin-login-btn:hover {
      background: #0d6b63;
    }

    .admin-login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #adminLoginMessage {
      margin-top: 16px;
      font-size: 0.94rem;
      font-weight: 600;
      min-height: 22px;
    }

    #adminLoginMessage.error {
      color: #f87171;
    }

    #adminLoginMessage.success {
      color: #4ade80;
    }

    .back-link {
      display: block;
      margin-top: 22px;
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-link:hover {
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="admin-login-card">
    <span class="admin-login-badge">Admin Access</span>

    <h1>Admin Login</h1>
    <p>Restricted area. Enter your admin credentials to continue.</p>

    <form id="adminLoginForm">
      <div class="form-group">
        <label for="adminEmail">Email</label>
        <input
          type="email"
          id="adminEmail"
          placeholder="admin@cbt.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="adminPassword">Password</label>
        <input
          type="password"
          id="adminPassword"
          placeholder="••••••••"
          required
        />
      </div>

      <button type="submit" class="admin-login-btn" id="adminLoginBtn">
        Login as Admin
      </button>
    </form>

    <p id="adminLoginMessage"></p>

    <a href="index.html" class="back-link">
      ← Back to home
    </a>
  </div>

  <!-- CONNECT JS -->
  <script type="module" src="js/pages/adminLogin.js"></script>

</body>
</html>
